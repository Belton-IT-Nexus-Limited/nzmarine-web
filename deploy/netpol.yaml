apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nzmarine-web-allow-ingress-nginx
  namespace: tenant-nzmarine
  labels:
    portal.platform/app: "nzmarine-web"
    portal.platform/managed-by: portal-client-domains
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nzmarine-web
  policyTypes: [Ingress]
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          app.kubernetes.io/name: rke2-ingress-nginx
