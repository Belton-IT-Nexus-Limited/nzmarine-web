server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # A missing file must return an UNCACHEABLE 404. Without this, a transient
    # 404 during a rolling deploy (client hits an old pod for a new asset hash)
    # gets cached at the CDN edge and the site renders unstyled until it expires.
    location @missing {
        add_header Cache-Control "no-store" always;
        return 404;
    }

    # Fingerprinted build assets: cache hard on hit, no-store on miss.
    location /assets/ {
        try_files $uri @missing;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fonts and images: medium cache on hit, no-store on miss.
    location ~* \.(woff2?|jpg|jpeg|png|svg|webp|ico)$ {
        try_files $uri @missing;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA: never cache the shell, fall back to it for client routes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
