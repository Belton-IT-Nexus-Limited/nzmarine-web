apiVersion: apps/v1
kind: Deployment
metadata:
  name: nzmarine-web
  namespace: tenant-nzmarine
  labels:
    app.kubernetes.io/name: nzmarine-web
    portal.platform/app: nzmarine-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nzmarine-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nzmarine-web
        portal.platform/app: nzmarine-web
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nzmarine-web
      containers:
        - name: nzmarine-web
          image: zot.zot.svc.cluster.local:5000/nzmarine/nzmarine-web@sha256:86261ee99302d2980215d306954309c8f7ffbc848c7083065380acf0c46f8095
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
---
apiVersion: v1
kind: Service
metadata:
  name: nzmarine-web
  namespace: tenant-nzmarine
  labels:
    app.kubernetes.io/name: nzmarine-web
    portal.platform/app: nzmarine-web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nzmarine-web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
