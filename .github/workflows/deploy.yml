name: Build and deploy

# On every push to main (except the promote commit and docs), build the site
# image, push it to the Belton platform registry (docker.bitn.co.nz, the
# external endpoint of the in-cluster zot that Flux-managed workloads pull
# from), then write the new immutable digest into deploy/deployment.yaml
# using the in-cluster registry address. Flux watches this repo and rolls it
# out to tenant-nzmarine.
#
# GHCR is not used: the cluster pulls from its internal registry only, and a
# private ghcr package left the rollout stuck in ImagePullBackOff (2026-07-05).
on:
  push:
    branches: [main]
    paths-ignore:
      - 'deploy/deployment.yaml'
      - 'README.md'
      - '**/*.md'

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: docker.bitn.co.nz
  IMAGE: docker.bitn.co.nz/nzmarine/nzmarine-web
  # The address the cluster pulls the same image from.
  CLUSTER_IMAGE: zot.zot.svc.cluster.local:5000/nzmarine/nzmarine-web

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to the Belton platform registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.BITN_OCI_USER }}
          password: ${{ secrets.BITN_OCI_PWD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Promote digest into deploy manifest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          REF="${CLUSTER_IMAGE}@${DIGEST}"
          echo "Promoting ${REF}"
          sed -i -E "s#(^[[:space:]]*image:[[:space:]]*).*#\1${REF}#" deploy/deployment.yaml
          grep 'image:' deploy/deployment.yaml
          git config user.name "nzmarine-ci"
          git config user.email "ci@belton-it-nexus.dev"
          git add deploy/deployment.yaml
          if git diff --cached --quiet; then
            echo "No image change to promote."
            exit 0
          fi
          git commit -m "deploy: nzmarine-web ${DIGEST}"
          git push
